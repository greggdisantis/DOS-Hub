name: Deploy to Google Cloud Run

on:
  workflow_dispatch:

env:
  GCP_PROJECT_ID: manus-dos-hub
  GCP_REGION: us-central1
  IMAGE_NAME: dos-hub-app

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for GCR
        run: |
          gcloud auth configure-docker gcr.io

      - name: Build Docker image
        run: |
          docker build -t gcr.io/${{ env.GCP_PROJECT_ID }}/${{ env.IMAGE_NAME }}:latest .

      - name: Push image to GCR
        run: |
          docker push gcr.io/${{ env.GCP_PROJECT_ID }}/${{ env.IMAGE_NAME }}:latest

      - name: Get existing environment variables
        id: get-env
        run: |
          ENV_VARS=$(gcloud run services describe dos-hub \
            --region ${{ env.GCP_REGION }} \
            --format 'value(spec.template.spec.containers[0].env)' 2>/dev/null || echo "")
          echo "env_vars=$ENV_VARS" >> $GITHUB_OUTPUT

      - name: Deploy to Cloud Run
        run: |
          # Get the existing environment variables from the dos-hub service
          EXISTING_ENV=$(gcloud run services describe dos-hub \
            --region ${{ env.GCP_REGION }} \
            --format 'value(spec.template.spec.containers[0].env[].name=.value)' 2>/dev/null | tr '\n' ',' || echo "NODE_ENV=production")
          
          # Deploy to the existing dos-hub service with all environment variables
          gcloud run deploy dos-hub \
            --image gcr.io/${{ env.GCP_PROJECT_ID }}/${{ env.IMAGE_NAME }}:latest \
            --region ${{ env.GCP_REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --memory 1Gi \
            --cpu 1 \
            --timeout 3600 \
            --update-env-vars "NODE_ENV=production" \
            --no-traffic || true

      - name: Get Cloud Run URL
        run: |
          gcloud run services describe dos-hub \
            --region ${{ env.GCP_REGION }} \
            --format 'value(status.url)'
